<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Array Generator</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container">
        <header>
            <h1>Array Generator</h1>
        </header>

        <div class="top-nav">
            <div class="custom-dropdown" id="mode-dropdown">
                <div class="dropdown-trigger" id="dropdown-trigger">
                    <span id="current-mode-text">NumPy</span>
                    <svg class="select-arrow" width="12" height="12" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="3">
                        <path d="M6 9l6 6 6-6" />
                    </svg>
                </div>
                <div class="dropdown-menu" id="dropdown-menu">
                    <div class="dropdown-item active" data-value="numpy">NumPy</div>
                    <div class="dropdown-item" data-value="latex">LaTeX</div>
                </div>
            </div>

            <!-- LaTeX Specific Options -->
            <div id="latex-options" class="hidden">
                <label class="checkbox-container">
                    <input type="checkbox" id="augmented-matrix">
                    <span class="checkbox-label">Augmented Matrix (m | n)</span>
                </label>
            </div>
        </div>

        <section class="main-controls">
            <div class="control-box">
                <div class="controls-inputs">
                    <div class="input-group">
                        <label for="rows">Rows (m)</label>
                        <input type="number" id="rows" min="1" value="3" aria-label="Number of rows">
                    </div>
                    <div class="input-group">
                        <label for="cols">Columns (n)</label>
                        <input type="number" id="cols" min="1" value="3" aria-label="Number of columns">
                    </div>
                </div>
                <div class="button-group">
                    <button id="generate-btn" class="primary-btn">Generate</button>
                    <button id="reset-btn" class="secondary-btn">Reset</button>
                </div>
            </div>

            <section id="shortcuts-section" class="reference-section">
                <div class="shortcuts-columns">
                    <div class="shortcuts-col">
                        <div class="shortcut-pill"><code>pi</code></div>
                        <div class="shortcut-pill"><code>exp(x)</code></div>
                        <div class="shortcut-pill"><code>inf</code></div>
                        <div class="shortcut-pill"><code>log(x)</code></div>
                    </div>
                    <div class="shortcuts-col">
                        <div class="shortcut-pill"><code>sqrt(x)</code></div>
                        <div class="shortcut-pill"><code>sin(x)</code></div>
                        <div class="shortcut-pill"><code>cos(x)</code></div>
                        <div class="shortcut-pill"><code>tan(x)</code></div>
                    </div>
                </div>
            </section>
        </section>

        <section class="grid-section">
            <div id="grid-wrapper" class="grid-wrapper">
                <div id="grid-container" class="grid-container"></div>
            </div>
            <button id="submit-btn" class="primary-btn" style="display: none;">Submit</button>
        </section>

        <section id="output-section" class="output-section" style="display: none;">
            <div class="output-header">
                <h2>Generated Code</h2>
                <button id="copy-btn" class="icon-btn" title="Copy to clipboard">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                    </svg>
                    Copy
                </button>
            </div>
            <pre><code id="output-code"></code></pre>
        </section>

        <footer>
            <p>&copy; Thierry Kall - 2026</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>

</html>
